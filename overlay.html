<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orca + Track Overlay</title>
<style>
:root{--bg:#faf9f5;--surf:#fff;--txt:#1a1a18;--txt2:#5f5e5a;--bd:#e0ded6;--acc:#185fa5;--accbg:#e6f1fb;--warn:#a32d2d;--drone:#1d9e75;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--surf:#2c2c2a;--txt:#f2f0e9;--txt2:#b4b2a9;--bd:#444441;--acc:#85b7eb;--accbg:#0c447c;--warn:#f09595;--drone:#5dcaa5;}}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:16px;line-height:1.5;max-width:640px;margin:0 auto;}
h1{font-size:18px;font-weight:500;margin:0 0 12px;}
button{font:inherit;font-size:15px;background:var(--surf);color:var(--txt);border:0.5px solid var(--bd);border-radius:8px;padding:10px 14px;cursor:pointer;}
button:active{transform:scale(.97);}
button.on{background:var(--accbg);border-color:var(--acc);color:var(--acc);}
input[type=range]{flex:1;min-width:140px;}
input[type=number]{font:inherit;font-size:15px;background:var(--surf);color:var(--txt);border:0.5px solid var(--bd);border-radius:8px;padding:6px 8px;width:64px;}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
svg{width:100%;display:block;background:var(--surf);border:0.5px solid var(--bd);border-radius:12px;touch-action:none;cursor:grab;}
svg:active{cursor:grabbing;}
.mut{color:var(--txt2);font-size:13px;}
.warn{color:var(--warn);}
.stamp{font-size:16px;font-weight:500;margin-bottom:4px;}
.load{border:1.5px dashed var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;}
.load div{margin-top:6px;}
.ok{color:var(--acc);}
.leg{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:-1px;margin-right:4px;}
</style>
</head>
<body>
<h1>Orca + ship track overlay</h1>
<div class="load">
  1. Ship track (GPX): <input type="file" id="gpx" accept=".gpx,.xml">
  <div id="gpxst" class="mut">not loaded</div>
</div>
<div class="load">
  2. Orca scans (CSV): <input type="file" id="csv" accept=".csv">
  <div id="csvst" class="mut">not loaded</div>
</div>
<div class="load">
  3. Drone track (SRT, optional — select all files): <input type="file" id="srt" accept=".srt" multiple>
  <div id="srtst" class="mut">not loaded</div>
  <div style="margin-top:8px;font-size:13px;color:var(--txt2);">Drone time → UTC offset: <input type="number" id="offset" value="7" step="1"> hours (PDT = 7)</div>
</div>
<div id="app" style="display:none;">
  <div class="row">
    <button id="prev">‹ Prev</button>
    <input id="slider" type="range" min="0" max="0" value="0" step="1">
    <button id="next">Next ›</button>
    <button id="play">▶ Play</button>
    <button id="trail" class="on">Trail</button>
    <button id="zoomin" aria-label="Zoom in">＋</button>
    <button id="zoomout" aria-label="Zoom out">－</button>
    <button id="reset">Reset view</button>
  </div>
  <div class="mut" style="margin-bottom:8px;"><span class="leg" style="background:var(--txt);"></span>boat &nbsp; <span class="leg" style="background:var(--acc);"></span>orca groups &nbsp; <span class="leg" style="background:var(--drone);"></span>drone</div>
  <div class="stamp" id="stamp">—</div>
  <div class="mut" id="meta" style="margin-bottom:4px;">—</div>
  <div id="flag" class="warn" style="font-size:13px;min-height:18px;margin-bottom:10px;"></div>
  <svg id="map" viewBox="0 0 600 460"></svg>
</div>
<script>
const W=600,H=460,PAD=44,svg=document.getElementById('map');
const dark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
const GRID=dark?'#555':'#ccc',FAINT=dark?'#888':'#999',LINE=dark?'#5f7fa0':'#9db8d6';
const DOT=dark?'#85b7eb':'#185fa5',BOAT=dark?'#f2f0e9':'#1a1a18',DTXT=dark?'#1a1a18':'#fff';
const DRONE=dark?'#5dcaa5':'#1d9e75',DRONELINE=dark?'#3a7d68':'#9fe1cb';
const D2R=Math.PI/180,R2D=180/Math.PI,MPD=111320;
let track=[],scans=[],drone=[],idx=0,trail=true,timer=null,proj=null,ready=false;
let zoom=1,panX=0,panY=0,scene=null;
function ns(t,a){const e=document.createElementNS('http://www.w3.org/2000/svg',t);for(k in a)e.setAttribute(k,a[k]);return e;}
function mpl(lat){return MPD*Math.cos(lat*D2R);}
function brg(a,b){const dN=(b.lat-a.lat)*MPD,dE=(b.lon-a.lon)*mpl((a.lat+b.lat)/2);let x=Math.atan2(dE,dN)*R2D;return x<0?x+360:x;}
function segd(a,b){const dN=(b.lat-a.lat)*MPD,dE=(b.lon-a.lon)*mpl((a.lat+b.lat)/2);return Math.hypot(dN,dE);}
function dest(lat,lon,bd,dist){const b=bd*D2R;return{lat:lat+dist*Math.cos(b)/MPD,lon:lon+dist*Math.sin(b)/mpl(lat)};}
function parseGPX(txt){const doc=new DOMParser().parseFromString(txt,'application/xml'),n=doc.getElementsByTagName('trkpt'),out=[];
  for(let i=0;i<n.length;i++){const lat=parseFloat(n[i].getAttribute('lat')),lon=parseFloat(n[i].getAttribute('lon'));if(isNaN(lat)||isNaN(lon))continue;
    const tn=n[i].getElementsByTagName('time')[0],ms=tn?Date.parse(tn.textContent.trim()):NaN;out.push({lat:lat,lon:lon,ms:ms});}
  out.sort((a,b)=>a.ms-b.ms);return out;}
function parseSRT(txt,offH){const out=[];const re=/(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}(?:\.\d+)?)[\s\S]*?\[latitude:\s*(-?\d+\.?\d*)\][\s\S]*?\[longitude:\s*(-?\d+\.?\d*)\]/g;let m;
  while((m=re.exec(txt))){const iso=m[1].replace(' ','T')+'Z',base=Date.parse(iso);if(isNaN(base))continue;const ms=base-offH*3600000;
    out.push({lat:parseFloat(m[2]),lon:parseFloat(m[3]),ms:ms});}
  return out;}
function parseCSV(txt){const lines=txt.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  const pr=l=>{const o=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];
    if(q){if(ch==='"'){if(l[i+1]==='"'){c+='"';i++;}else q=false;}else c+=ch;}else{if(ch===','){o.push(c);c='';}else if(ch==='"')q=true;else c+=ch;}}o.push(c);return o;};
  const H=pr(lines[0]),col=n=>H.indexOf(n),ci={ts:col('scan_ts_utc'),dist:col('distance_m'),bear:col('rel_bearing_deg'),sz:col('group_size'),unk:col('unknown_size'),dr:col('drone')},map={};
  for(let i=1;i<lines.length;i++){const r=pr(lines[i]),ts=r[ci.ts];if(!ts)continue;if(!map[ts])map[ts]={ts:ts,ms:Date.parse(ts),groups:[]};
    map[ts].groups.push({dist:+r[ci.dist],bearing:+r[ci.bear],unknown:ci.unk>=0&&/true/i.test(r[ci.unk]),size:/na|^$/i.test(r[ci.sz])?null:+r[ci.sz],drone:ci.dr>=0&&/true/i.test(r[ci.dr])});}
  return Object.values(map).sort((a,b)=>a.ms-b.ms);}
function downsample(pts,everyMs){if(!pts.length)return pts;pts.sort((a,b)=>a.ms-b.ms);const out=[pts[0]];let last=pts[0].ms;
  for(const p of pts){if(p.ms-last>=everyMs){out.push(p);last=p.ms;}}return out;}
function posAt(arr,t){if(!arr.length)return null;if(t<=arr[0].ms||t>=arr[arr.length-1].ms)return null;
  let i=0;while(i<arr.length-1&&arr[i+1].ms<t)i++;const a=arr[i],b=arr[i+1],f=(t-a.ms)/(b.ms-a.ms||1);return{lat:a.lat+(b.lat-a.lat)*f,lon:a.lon+(b.lon-a.lon)*f};}
function boatAt(t){if(t<=track[0].ms)return{pos:track[0],i:0,inRange:t>=track[0].ms-1};
  if(t>=track[track.length-1].ms)return{pos:track[track.length-1],i:track.length-2,inRange:t<=track[track.length-1].ms+1};
  let i=0;while(i<track.length-1&&track[i+1].ms<t)i++;const a=track[i],b=track[i+1],f=(t-a.ms)/(b.ms-a.ms||1);
  return{pos:{lat:a.lat+(b.lat-a.lat)*f,lon:a.lon+(b.lon-a.lon)*f},i:i,inRange:true};}
function cogAt(i0){let lo=Math.max(0,i0),hi=Math.min(track.length-1,i0+1),g=0;
  while(segd(track[lo],track[hi])<15&&g<track.length){if(lo>0)lo--;else if(hi<track.length-1)hi++;else break;g++;}
  return{cog:brg(track[lo],track[hi]),stationary:segd(track[lo],track[hi])<15};}
function build(){scans.forEach(s=>{const b=boatAt(s.ms),c=cogAt(b.i);s.boat=b.pos;s.inRange=b.inRange;s.cog=c.cog;s.stationary=c.stationary;
  s.gpts=s.groups.map(g=>{const abs=(c.cog+g.bearing)%360,p=dest(b.pos.lat,b.pos.lon,abs,g.dist);return Object.assign({},g,{lat:p.lat,lon:p.lon});});});
  let mnla=90,mxla=-90,mnlo=180,mxlo=-180;const ext=(la,lo)=>{mnla=Math.min(mnla,la);mxla=Math.max(mxla,la);mnlo=Math.min(mnlo,lo);mxlo=Math.max(mxlo,lo);};
  scans.forEach(s=>{if(s.inRange){ext(s.boat.lat,s.boat.lon);s.gpts.forEach(g=>ext(g.lat,g.lon));}});
  if(mnla>mxla){track.forEach(p=>ext(p.lat,p.lon));}
  const midla=(mnla+mxla)/2,k=Math.cos(midla*D2R);
  const gw=(mxlo-mnlo)*k,gh=(mxla-mnla),span=Math.max(gw,gh,1e-6)*1.3;
  const ctrLon=(mnlo+mxlo)/2,ctrLat=(mnla+mxla)/2;
  const sc=Math.min(W-2*PAD,H-2*PAD)/span,ox=W/2,oy=H/2;
  proj=(la,lo)=>[ox+((lo-ctrLon)*k)*sc,oy-((la-ctrLat))*sc];}
function fmt(ms){return new Date(ms).toISOString().replace('T',' ').replace(/\..*/,'')+'Z';}
function applyT(){if(scene)scene.setAttribute('transform','translate('+panX+' '+panY+') scale('+zoom+')');}
function dot(x,y,g,op){const z=zoom;scene.appendChild(ns('circle',{cx:x,cy:y,r:11/z,fill:DOT,stroke:dark?'#1a1a18':'#fff','stroke-width':(2/z),opacity:op}));
  const t=ns('text',{x:x,y:y+4/z,'font-size':(11/z),fill:DTXT,'text-anchor':'middle','font-weight':'700'});t.textContent=g.unknown?'?':g.size;scene.appendChild(t);
  if(g.drone){scene.appendChild(ns('circle',{cx:x+10/z,cy:y-10/z,r:4.5/z,fill:'#fff',stroke:DOT,'stroke-width':(1.5/z)}));
    const d=ns('text',{x:x+10/z,y:y-7/z,'font-size':(7/z),fill:DOT,'text-anchor':'middle','font-weight':'700'});d.textContent='D';scene.appendChild(d);}}
function draw(){svg.innerHTML='';if(!ready)return;
  scene=ns('g',{});svg.appendChild(scene);applyT();
  if(drone.length){let dp='';drone.forEach((p,i)=>{const[x,y]=proj(p.lat,p.lon);dp+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);});
    scene.appendChild(ns('path',{d:dp,fill:'none',stroke:DRONELINE,'stroke-width':(1.5/zoom).toFixed(2),'stroke-linejoin':'round'}));}
  let path='';track.forEach((p,i)=>{const[x,y]=proj(p.lat,p.lon);path+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);});
  scene.appendChild(ns('path',{d:path,fill:'none',stroke:LINE,'stroke-width':(2/zoom).toFixed(2),'stroke-linejoin':'round'}));
  const s=scans[idx];
  if(trail&&idx>0&&scans[idx-1].inRange){scans[idx-1].gpts.forEach(g=>{const[x,y]=proj(g.lat,g.lon);scene.appendChild(ns('circle',{cx:x,cy:y,r:11/zoom,fill:DOT,stroke:'none',opacity:'0.16'}));});}
  // if(trail&&idx>0&&scans[idx-1].inRange){scans[idx-1].gpts.forEach(g=>{const[x,y]=proj(g.lat,g.lon);scene.appendChild(ns('circle',{cx:x,cy:y,r:11,fill:DOT,stroke:'none',opacity:'0.16'}));});}
  if(s.inRange){const[bx,by]=proj(s.boat.lat,s.boat.lon),hr=(s.cog-90)*D2R;
      scene.appendChild(ns('line',{x1:bx,y1:by,x2:bx+(16/zoom)*Math.cos(hr),y2:by+(16/zoom)*Math.sin(hr),stroke:BOAT,'stroke-width':(2/zoom)}));
      scene.appendChild(ns('circle',{cx:bx,cy:by,r:6/zoom,fill:BOAT,stroke:dark?'#1a1a18':'#fff','stroke-width':(2/zoom)}));
      s.gpts.forEach(g=>{const[x,y]=proj(g.lat,g.lon);dot(x,y,g,'0.8');});}
  let dstat='';const dpos=posAt(drone,s.ms);
    if(dpos){const[dx,dy]=proj(dpos.lat,dpos.lon);scene.appendChild(ns('circle',{cx:dx,cy:dy,r:6/zoom,fill:DRONE,stroke:dark?'#1a1a18':'#fff','stroke-width':(2/zoom)}));
      const dl=ns('text',{x:dx,y:dy-9/zoom,'font-size':(9/zoom),fill:DRONE,'text-anchor':'middle','font-weight':'700'});dl.textContent='drone';scene.appendChild(dl);}
    else if(drone.length){dstat=' · drone not airborne at this time';}
  document.getElementById('stamp').textContent=fmt(s.ms);
  const tot=s.groups.reduce((a,g)=>a+(g.unknown||g.size==null?0:g.size),0);
  document.getElementById('meta').textContent=s.groups.length+' groups · '+tot+' whales · boat '+s.boat.lat.toFixed(5)+', '+s.boat.lon.toFixed(5)+' · heading '+Math.round(s.cog)+'°'+dstat+'   ('+(idx+1)+' of '+scans.length+')';
  document.getElementById('flag').textContent=!s.inRange?'⚠ scan time is outside the track — boat position and groups can\'t be placed':(s.stationary?'⚠ boat ~stationary here; heading (and group directions) uncertain':'');
  const sl=document.getElementById('slider');sl.max=scans.length-1;sl.value=idx;}
function svgpt(clientX,clientY){const r=svg.getBoundingClientRect();return[(clientX-r.left)/r.width*W,(clientY-r.top)/r.height*H];}
function zoomAt(sx,sy,factor){const nz=Math.min(60,Math.max(1,zoom*factor));const k=nz/zoom;panX=sx-k*(sx-panX);panY=sy-k*(sy-panY);zoom=nz;clampPan();applyT();}
function clampPan(){if(zoom<=1){panX=0;panY=0;}}
function resetView(){zoom=1;panX=0;panY=0;draw();}
function tryReady(){if(track.length&&scans.length){build();ready=true;idx=0;zoom=1;panX=0;panY=0;document.getElementById('app').style.display='block';draw();}}
document.getElementById('gpx').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{track=parseGPX(r.result);
  document.getElementById('gpxst').textContent=track.length?track.length+' track points loaded ✓':'no track points found';document.getElementById('gpxst').className=track.length?'ok':'mut';tryReady();};r.readAsText(f);};
document.getElementById('csv').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{scans=parseCSV(r.result);
  document.getElementById('csvst').textContent=scans.length?scans.length+' scans loaded ✓':'no scans found';document.getElementById('csvst').className=scans.length?'ok':'mut';tryReady();};r.readAsText(f);};
document.getElementById('srt').onchange=e=>{const fs=[...e.target.files];if(!fs.length)return;const off=+document.getElementById('offset').value||0;let done=0,all=[];
  fs.forEach(f=>{const r=new FileReader();r.onload=()=>{all=all.concat(parseSRT(r.result,off));done++;
    if(done===fs.length){drone=downsample(all,1000);
      document.getElementById('srtst').textContent=drone.length?drone.length+' drone points from '+fs.length+' file(s) ✓':'no drone points found';
      document.getElementById('srtst').className=drone.length?'ok':'mut';if(ready)draw();}};r.readAsText(f);});};
document.getElementById('offset').onchange=()=>{if(drone.length){const off=+document.getElementById('offset').value||0;drone.forEach(p=>{});}
  document.getElementById('srtst').textContent+=' (reload SRTs to apply new offset)';};
document.getElementById('slider').oninput=e=>{idx=+e.target.value;draw();};
document.getElementById('prev').onclick=()=>{idx=Math.max(0,idx-1);draw();};
document.getElementById('next').onclick=()=>{idx=Math.min(scans.length-1,idx+1);draw();};
document.getElementById('trail').onclick=e=>{trail=!trail;e.target.className=trail?'on':'';draw();};
document.getElementById('zoomin').onclick=()=>zoomAt(W/2,H/2,1.4);
document.getElementById('zoomout').onclick=()=>zoomAt(W/2,H/2,1/1.4);
document.getElementById('reset').onclick=resetView;
document.getElementById('play').onclick=e=>{if(timer){clearInterval(timer);timer=null;e.target.textContent='▶ Play';e.target.className='';}
  else{e.target.textContent='⏸ Pause';e.target.className='on';timer=setInterval(()=>{if(idx>=scans.length-1){clearInterval(timer);timer=null;document.getElementById('play').textContent='▶ Play';document.getElementById('play').className='';return;}idx++;draw();},500);}};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){idx=Math.max(0,idx-1);draw();}if(e.key==='ArrowRight'){idx=Math.min(scans.length-1,idx+1);draw();}});
svg.addEventListener('wheel',e=>{e.preventDefault();const[sx,sy]=svgpt(e.clientX,e.clientY);zoomAt(sx,sy,e.deltaY<0?1.12:1/1.12);},{passive:false});
let ptrs=new Map(),lastMid=null,lastDist=null;
svg.addEventListener('pointerdown',e=>{svg.setPointerCapture(e.pointerId);ptrs.set(e.pointerId,[e.clientX,e.clientY]);lastMid=null;lastDist=null;});
svg.addEventListener('pointermove',e=>{if(!ptrs.has(e.pointerId))return;ptrs.set(e.pointerId,[e.clientX,e.clientY]);const pts=[...ptrs.values()];
  if(pts.length===1){if(lastMid){const dx=(pts[0][0]-lastMid[0]),dy=(pts[0][1]-lastMid[1]),r=svg.getBoundingClientRect();panX+=dx/r.width*W;panY+=dy/r.height*H;clampPan();applyT();}lastMid=pts[0];}
  else if(pts.length===2){const mx=(pts[0][0]+pts[1][0])/2,my=(pts[0][1]+pts[1][1])/2,d=Math.hypot(pts[0][0]-pts[1][0],pts[0][1]-pts[1][1]);
    const[sx,sy]=svgpt(mx,my);if(lastDist){zoomAt(sx,sy,d/lastDist);}if(lastMid){const r=svg.getBoundingClientRect();panX+=(mx-lastMid[0])/r.width*W;panY+=(my-lastMid[1])/r.height*H;clampPan();applyT();}lastDist=d;lastMid=[mx,my];}});
function endptr(e){ptrs.delete(e.pointerId);lastMid=null;lastDist=null;}
svg.addEventListener('pointerup',endptr);svg.addEventListener('pointercancel',endptr);
</script>
</body>
</html>
